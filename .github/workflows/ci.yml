name: CI

on:
  pull_request_target:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR or branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # Permission check for fork PRs - ensures maintainer approval before running with secrets
  # For PRs from forks, this job will fail until a maintainer re-runs it
  check-fork-permissions:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Get User Permission
        id: checkAccess
        uses: actions-cool/check-user-permission@v2
        with:
          require: write
          username: ${{ github.triggering_actor }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check User Permission
        if: steps.checkAccess.outputs.require-result == 'false'
        run: |
          echo "${{ github.triggering_actor }} does not have permissions on this repo."
          echo "Current permission level is ${{ steps.checkAccess.outputs.user-permission }}"
          echo "Job originally triggered by ${{ github.actor }}"
          exit 1

  # Detect which parts of the codebase changed to skip unnecessary tests
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'react/src/**'
              - 'react/public/**'
              - 'react/package.json'
              - 'react/package-lock.json'
              - 'react/biome.json'
              - 'react/jsconfig.json'
            backend:
              - 'api/**'
              - 'core/**'
              - 'arango_api/**'
              - 'requirements.txt'
              - 'manage.py'
              - 'Dockerfile'
              - '.dockerignore'
            e2e:
              - 'react/src/**'
              - 'react/public/**'
              - 'react/tests/e2e/**'
              - 'react/playwright.config.ts'
              - 'api/**'
              - 'core/**'
              - 'arango_api/**'

  # Frontend linting with Biome - auto-fixes and pushes on PRs
  frontend-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 2

      - name: Check if last commit was auto-fix
        id: check-autofix
        run: |
          if git log -1 --pretty=%B | grep -q "\[biome auto-fix\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        working-directory: .

      - name: Setup Node.js
        if: steps.check-autofix.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'

      - name: Cache node_modules
        if: steps.check-autofix.outputs.skip != 'true'
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: react/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('react/package-lock.json') }}

      - name: Install dependencies
        if: steps.check-autofix.outputs.skip != 'true' && steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Biome auto-fix
        if: steps.check-autofix.outputs.skip != 'true'
        run: npm run fix
        continue-on-error: true

      - name: Check for changes and push
        if: steps.check-autofix.outputs.skip != 'true' && github.event_name == 'pull_request_target'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain react/) ]]; then
            echo "Biome made changes, committing and pushing..."
            git add react/
            git commit -m "style: auto-fix linting issues [biome auto-fix]"
            git push
            echo "Changes pushed. The workflow will re-run on the new commit."
          else
            echo "No changes needed"
          fi

      - name: Run Biome check
        if: steps.check-autofix.outputs.skip != 'true'
        run: npm run check

  # Frontend unit tests with Jest
  frontend-unit-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: react/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('react/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --watchAll=false --coverage --ci
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: react/coverage
          if-no-files-found: ignore
          retention-days: 7

  # Frontend E2E tests with Playwright
  frontend-e2e:
    needs: detect-changes
    if: needs.detect-changes.outputs.e2e == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: react/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('react/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true
          PORT: '3000'
          BROWSER: 'none'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: react/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: react/test-results
          if-no-files-found: ignore
          retention-days: 7

  # Backend unit tests - no database required
  backend-unit-tests:
    needs: [detect-changes, check-fork-permissions]
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.check-fork-permissions.result == 'success' || needs.check-fork-permissions.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django unit tests
        run: python manage.py test --exclude-tag=integration --verbosity=2
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ARANGO_TEST_MODE: 'true'

  # Backend integration tests - requires ArangoDB
  backend-integration-tests:
    needs: [detect-changes, check-fork-permissions]
    if: |
      always() &&
      (needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      (needs.check-fork-permissions.result == 'success' || needs.check-fork-permissions.result == 'skipped')
    runs-on: ubuntu-latest
    services:
      arangodb:
        image: arangodb:latest
        ports:
          - 8530:8529
        env:
          ARANGO_ROOT_PASSWORD: test
        options: >-
          --health-cmd "arangosh --server.password test --javascript.execute-string 'db._version()'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for ArangoDB to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8530/_api/version > /dev/null; then
              echo "ArangoDB is ready"
              break
            fi
            echo "Waiting for ArangoDB... attempt $i of 30"
            sleep 2
          done

      - name: Run Django integration tests
        run: python manage.py test --tag=integration --verbosity=2
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          ARANGO_TEST_MODE: 'true'
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

  # Backend Docker build - verify the image builds successfully
  backend-docker-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nlm-ckn-backend .

  # Final status check - used for branch protection rules
  # Note: !cancelled() prevents orphaned status reports when workflow is cancelled
  # due to new commits triggering cancel-in-progress
  ci-passed:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - check-fork-permissions
      - frontend-lint
      - frontend-unit-tests
      - frontend-e2e
      - backend-unit-tests
      - backend-integration-tests
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Check all jobs passed
        run: |
          echo "Fork permissions: ${{ needs.check-fork-permissions.result }}"
          echo "Frontend lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend unit tests: ${{ needs.frontend-unit-tests.result }}"
          echo "Frontend E2E: ${{ needs.frontend-e2e.result }}"
          echo "Backend unit tests: ${{ needs.backend-unit-tests.result }}"
          echo "Backend integration tests: ${{ needs.backend-integration-tests.result }}"
          echo "Backend Docker build: ${{ needs.backend-docker-build.result }}"

          # Check if any job failed - skipped jobs are OK due to path filtering
          if [[ "${{ needs.check-fork-permissions.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-lint.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-e2e.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-integration-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.backend-docker-build.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi

          echo "All checks passed"
