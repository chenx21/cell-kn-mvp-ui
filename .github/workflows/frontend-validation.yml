name: frontend-validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  biome:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Cache npm & node_modules
        uses: actions/cache@v4
        with:
          path: |
            react/node_modules
            ~/.npm
            ~/.npm/_cacache
          key: ${{ runner.os }}-node-${{ hashFiles('react/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'react/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run CI check
        run: npm run check
