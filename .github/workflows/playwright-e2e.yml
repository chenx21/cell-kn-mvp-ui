name: Playwright E2E (manual)

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react/package.json

      - name: Install dependencies (React)
        working-directory: react
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: react
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (with traces/videos)
        working-directory: react
        env:
          CI: 'true'
          # Important so CRA listens on 3000
          PORT: '3000'
          BROWSER: 'none'
        run: npm run test:e2e:artifacts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: react/playwright-report
          if-no-files-found: ignore

      - name: Upload raw test results (videos/screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: react/test-results
          if-no-files-found: ignore
