AWSTemplateFormatVersion: '2010-09-09'
Description: 'ArangoDB on EC2 with EBS persistence and S3 restore capability'

Parameters:
  pAWSAccount:
     Description: 'Account (NLM-PROD, NLM-QA, NLM-INT, NLM-SEC)'
     Type: String
     Default: "NLM-SBOX"

  pVPCName:
    Type: String
    Default: "vpc-101"
    Description: Project name for resource naming

  pAppName:
    Type: String
    Default: "CELL-KN"
    Description: Project name for resource naming

  pAppNameLC:
    Type: String
    Default: "cell-kn"
    Description: Project name for resource naming

  ProjectName:
    Type: String
    Default: "cell-kn"
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: "dev"
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  LogGroup:
    Type: String
    Description: CloudWatch Logs group name for ArangoDB logs
    Default: "/aws/arango/instance/sunsetting-db-sbox/arangodb"

  ArangoDbUser:
    Type: String
    Default: "root"
    Description: ArangoDB root username

  # EC2 instance type. t4g (Graviton2/ARM64) is ~20% cheaper than equivalent
  # t3 (x86). arangodb:3.12 is multi-arch and supports ARM64.
  # t4g.medium: 2 vCPU / 4 GB RAM — recommended for ArangoDB with a modest dataset.
  InstanceType:
    Type: String
    Default: "t3.medium"
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
      - t3.small
      - t3.medium
      - t3.large
    Description: EC2 instance type for ArangoDB (t4g Graviton2 recommended - same specs, ~20% cheaper)

  # EBS volume size in GB for ArangoDB data.
  EbsVolumeSize:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 500
    Description: EBS volume size (GB) for ArangoDB data

  # IAM instance profile ARN - empty in dev (created by this template).
  # In sandbox/prod this must be a pre-created ARN passed in from deploy script.
  InstanceProfileArn:
    Type: String
    Default: 'arn:aws:iam::206537881715:instance-profile/cell-kn-sandbox-arangodb-ec2'
    Description: >
      Pre-existing IAM instance profile ARN (sandbox/prod only).
      Leave empty in dev - the profile will be created by this template.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: EC2 / Storage Configuration
        Parameters:
          - InstanceType
          - EbsVolumeSize
      - Label:
          default: Pre-existing IAM (sandbox/prod only - leave empty in dev)
        Parameters:
          - InstanceProfileArn

Conditions:
  IsDev: !Equals [!Ref Environment, 'dev']

Resources:
  # ============================================================================
  # Cloud Map Service for Service Discovery
  # EC2 instance self-registers via UserData using the AWS CLI.
  # ============================================================================
  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: arangodb
      DnsConfig:
        NamespaceId: !ImportValue
          Fn::Sub: '${ProjectName}-${Environment}-namespace-id'
        DnsRecords:
          - Type: A
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ============================================================================
  # EC2 Instance
  #
  # Uses the latest Amazon Linux 2023 AMI (resolved at deploy time via SSM).
  # EBS volume for data is attached separately and mounted to /var/lib/arangodb3
  # so it survives instance replacement.
  #
  # UserData performs:
  #   1. Install Docker + CloudWatch agent
  #   2. Format + mount EBS data volume (skipped if already formatted)
  #   3. S3 restore (same logic as the former init container)
  #   4. Run ArangoDB via Docker
  #   5. Register with Cloud Map service discovery
  # ============================================================================
  ArangoDbInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - ServiceDiscoveryService
   CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
    Properties:
      # arm64 AMI — matches t4g (Graviton2) instance family.
      # If switching back to t3/x86, change to: al2023-ami-kernel-default-x86_64
      #ImageId: ami-0b7590cd0375fb3d8
      ImageId: ami-0419af41559343838
      InstanceType: !Ref InstanceType
      KeyName: chenx21-piv
      SubnetId:  subnet-0a0aacec5e8ceefcd
      SecurityGroupIds: [
        "sg-0b819f618599f1f07",
        "sg-0b0663822cede0ec3"
      ]
      IamInstanceProfile: !If
        - IsDev
        #- Ref InstanceProfileName
        - cell-kn-sandbox-arangodb-ec2
        - !Ref InstanceProfileArn
        #- arn:aws:iam::206537881715:instance-profile/cell-kn-sandbox-arangodb-ec2
      BlockDeviceMappings:
        # Root volume — OS only
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 25
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
        # Data volume — ArangoDB data, persisted independently
        - DeviceName: /dev/xvdb
          Ebs:
            VolumeSize: !Ref EbsVolumeSize
            VolumeType: gp3
            DeleteOnTermination: false
            Encrypted: true
      UserData:
        Fn::Base64:  !Sub |
          #!/bin/bash
          exec > >(tee /var/log/arangodb-setup.log | logger -t arangodb-setup) 2>&1
          set -euxo pipefail
          
          PROJECT_NAME="cell-kn"
          ENVIRONMENT="dev"
          REGION="us-east-1"
          ACCOUNT_ID="206537881715"
          LOG_GROUP="/aws/arango/instance/cell-kn-db-sbox/arangodb"
          SD_SERVICE_ID="${ServiceDiscoveryService}"
          
          # ── 1. System setup ──────────────────────────────────────────────────
          #yum update -y
          #yum install -y docker aws-cli
          systemctl stop firewalld
          systemctl disable firewalld 
          
          sudo systemctl restart amazon-ssm-agent
          # CloudWatch agent
          yum install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWAGENT'
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/arangodb-setup.log",
                      "log_group_name": "${LogGroup}",
                      "log_stream_name": "setup/{instance_id}",
                      "timestamp_format": "%Y-%m-%dT%H:%M:%S"
                    },
                    {
                      "file_path": "/var/log/arangodb-docker.log",
                      "log_group_name": "${LogGroup}",
                      "log_stream_name": "arangodb/{instance_id}",
                      "timestamp_format": "%Y-%m-%dT%H:%M:%S"
                    }
                  ]
                }
              }
            }
          }
          CWAGENT
          systemctl enable amazon-cloudwatch-agent
          systemctl start amazon-cloudwatch-agent
          
          exec > >(tee /var/log/arangodb-setup.log | logger -t arangodb-setup) 2>&1
          echo "==> Starting ArangoDB setup $(date)"
          
          # ── 2. Mount EBS data volume ─────────────────────────────────────────
          DATA_DEVICE=/dev/xvdb
          DATA_DIR=/var/lib/arangodb3
          APPS_DIR=/var/lib/arangodb3-apps
          
          mkdir -p "$DATA_DIR" "$APPS_DIR"
          
          # Only format if the device has no filesystem yet (preserves data on restart)
          if ! blkid "$DATA_DEVICE" | grep -q TYPE; then
            echo "==> Formatting data volume..."
            mkfs.xfs "$DATA_DEVICE"
          else
            echo "==> Data volume already formatted, skipping mkfs"
          fi
          
          # Mount (idempotent via fstab)
          if ! grep -q "$DATA_DEVICE" /etc/fstab; then
            echo "$DATA_DEVICE $DATA_DIR xfs defaults,nofail 0 2" >> /etc/fstab
          fi
          mount -a
          echo "==> Data volume mounted at $DATA_DIR"
          
          # Set ownership to ArangoDB uid/gid (1000:1000 in official Docker image)
          chown -R 1000:1000 "$DATA_DIR" "$APPS_DIR"
          
          # ── 3. S3 restore (same logic as former init container) ──────────────
          echo "==> S3 Restore check"
          
          ARANGODB_S3_BUCKET=$(aws ssm get-parameter \
            --name "/platform/$PROJECT_NAME/arango/pArangodbBucketName" \
            --query 'Parameter.Value' \
            --output text \
            --region "$REGION")
          #ARANGODB_S3_BUCKET="nlm-sbox-alb-logs-us-east-1-bucket"
          echo "Dataset bucket: $ARANGODB_S3_BUCKET"
          
          CURRENT_VERSION=$(aws ssm get-parameter \
            --name "/platform/$PROJECT_NAME/arango/pDatasetVersion" \
            --query 'Parameter.Value' \
            --output text \
            --region "$REGION" \
            || echo "none")
          echo "Current dataset version: $CURRENT_VERSION"
          
          LAST_RESTORED=$(cat "$DATA_DIR/.dataset-version" 2>/dev/null || echo "none")
          echo "Last restored version: $LAST_RESTORED"
          
          if [ "$CURRENT_VERSION" = "$LAST_RESTORED" ]; then
            echo "Already on version $CURRENT_VERSION, skipping restore"
          elif [ "$CURRENT_VERSION" = "none" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "No dataset version specified, skipping restore"
          else
            echo "Version changed, restoring dataset..."
            echo "Clearing old data..."
            rm -rf "$DATA_DIR"/*
            rm -rf "$APPS_DIR"/*
          
            echo "Downloading s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION"
            aws s3 cp "s3://$ARANGODB_S3_BUCKET/$CURRENT_VERSION" /tmp/restore.tar.gz
          
            echo "Extracting backup..."
            # Auto-detect tar structure: some archives use var/lib/arangodb3/...
            # (created with -C /), others use arangodb/... (created with -C /var/lib).
            # Strip the top-level prefix and always extract into DATA_DIR.
            FIRST_ENTRY=$(tar -tzf /tmp/restore.tar.gz | head -1 || true)
            echo "Detected tar prefix: $FIRST_ENTRY"
            if echo "$FIRST_ENTRY" | grep -q "^var/lib/arangodb3"; then
              tar -xzf /tmp/restore.tar.gz -C /
            else
              tar -xzf /tmp/restore.tar.gz -C "$DATA_DIR" --strip-components=1
            fi
            rm -f /tmp/restore.tar.gz
          
            # Restore ownership after extraction
            chown -R 1000:1000 "$DATA_DIR" "$APPS_DIR"
          
            echo "$CURRENT_VERSION" > "$DATA_DIR/.dataset-version"
            echo "Restore completed successfully"
          fi
          
          # ── 4. Run ArangoDB via Docker ───────────────────────────────────────
          systemctl enable docker
          systemctl start docker
          
          ARANGO_PASSWORD="Svl6XSl25GDYYuGuW7UmGJ8kVvUvMhxMpa7sHSC1sX6uJuPcLh" #$(aws secretsmanager get-secret-value \
            #--secret-id "/$PROJECT_NAME/$ENVIRONMENT/secrets/arangodb-password" \
            #--secret-id "/cell-kn/sandbox/secrets/arangodb-password" \
            #--query 'SecretString' \
            #--output text \
            #--region "$REGION")
          
          # IMDSv2 token (AL2023 requires token-based metadata access)
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
            -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
          INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            http://169.254.169.254/latest/meta-data/instance-id)
          
          docker run -d \
            --name arangodb \
            --restart unless-stopped \
            -p 8529:8529 \
            -e ARANGO_ROOT_PASSWORD="$ARANGO_PASSWORD" \
            -e ARANGODB_OVERRIDE_DETECTED_TOTAL_MEMORY=3g \
            -v "$DATA_DIR:/var/lib/arangodb3" \
            -v "$APPS_DIR:/var/lib/arangodb3-apps" \
            --log-driver awslogs \
            --log-opt awslogs-region="$REGION" \
            --log-opt awslogs-group="$LOG_GROUP" \
            --log-opt awslogs-stream="arangodb/$INSTANCE_ID" \
            arangodb:3.12
          
          # ArangoDB first-boot initialisation (password setup, key generation) can
          # take several minutes. Poll for up to 10 minutes before giving up.
          # /_admin/server/availability returns 200 without authentication.
          echo "==> Waiting for ArangoDB to be ready (up to 10 min)..."
          READY=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8529/_admin/server/availability > /dev/null 2>&1; then
              echo "==> ArangoDB is ready after $i attempts"
              READY=1
              break
            fi
            echo "  attempt $i/60..."
            sleep 10
          done
          
          if [ "$READY" = "0" ]; then
            echo "ERROR: ArangoDB did not become ready in time"
            docker logs arangodb --tail 50 || true
            /opt/aws/bin/cfn-signal -e 1 \
              --stack "${AWS::StackName}" \
              --resource ArangoDbInstance \
              --region "${AWS::Region}"
            exit 1
          fi
          
          # ── 5. Register with Cloud Map ────────────────────────────────────────
          PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
            http://169.254.169.254/latest/meta-data/local-ipv4)
          
          echo "==> Registering with Cloud Map (service: $SD_SERVICE_ID, ip: $PRIVATE_IP)"
          aws servicediscovery register-instance \
            --service-id "$SD_SERVICE_ID" \
            --instance-id "$INSTANCE_ID" \
            --attributes "AWS_INSTANCE_IPV4=$PRIVATE_IP,AWS_INSTANCE_PORT=8529" \
            --region "$REGION"
          
          # ── 6. Register with ALB target group ────────────────────────────────
          TG_ARN="arn:aws:elasticloadbalancing:us-east-1:206537881715:targetgroup/cell-kn-sandbox-arangodb-tg/543bbbded93cc2f9" #$(aws cloudformation list-exports \
            #--region "$REGION" \
            #--query "Exports[?Name=='${ProjectName}-${Environment}-arangodb-tg-arn'].Value" \
            #--output text)
          
          echo "==> Registering with ALB target group ($TG_ARN)"
          aws elbv2 register-targets \
            --target-group-arn "$TG_ARN" \
            --targets '[{"Id":"'"$INSTANCE_ID"'","Port":8529}]' --region "$REGION"
          
          echo "==> Setup complete $(date)"
          
          # Signal CloudFormation success
          /opt/aws/bin/cfn-signal -e 0 \
            --stack "${AWS::StackName}" \
            --resource ArangoDbInstance \
            --region "${AWS::Region}"

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb'
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  InstanceId:
    Description: ArangoDB EC2 instance ID
    Value: !Ref ArangoDbInstance
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-instance-id'

  PrivateIp:
    Description: ArangoDB EC2 private IP
    Value: !GetAtt ArangoDbInstance.PrivateIp
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-private-ip'

