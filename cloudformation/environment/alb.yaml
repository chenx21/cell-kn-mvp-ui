AWSTemplateFormatVersion: '2010-09-09'
Description: 'Application Load Balancer for Cell-KN'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: sandbox
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  VpcId:
    Type: String
    Description: VPC ID (NIH-provided)
    Default: 'vpc-0ee6b25a12c642104'

  PublicSubnetIds:
    Type: CommaDelimitedList
    Description: Public subnet IDs for ALB (NIH-provided)
    Default: 'subnet-0f3493e28d597c47f,subnet-0713e6a5c5972fc4b,subnet-0d06c1e919d8a6a0f'

  AlbSecurityGroupId:
    Type: String
    Description: Security group ID for ALB
    Default: 'sg-06415d49b7c8a689c'

  AlbCertificate:
    Type: String
    Description: ACM certificate ARN for the ALB (must be in us-east-1 to work with CloudFront)
    Default: 'arn:aws:acm:us-east-1:206537881715:certificate/6efad63b-eb24-4a83-b781-61ad32b31003'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - PublicSubnetIds
          - AlbSecurityGroupId

Resources:
  # ============================================================================
  # ACM Certificate
  #
  # Single certificate shared by both ALB HTTPS listeners (port 8000 and 8529)
  # and by CloudFront (passed as a parameter to frontend.yaml).
  # When the ALB is in us-east-1, this cert satisfies both requirements.
  # ============================================================================
  #AlbCertificate:
  #  Type: AWS::CertificateManager::Certificate
  #  Properties:
  #    DomainName:  !Sub '${DomainName}'
  #    ValidationMethod: DNS
  #    DomainValidationOptions:
  #      - DomainName: !Sub '${DomainName}'
  #        HostedZoneId: !Ref HostedZoneId
  #    Tags:
  #      - Key: Project
  #        Value: !Ref ProjectName
  #      - Key: Environment
  #        Value: !Ref Environment
  #      - Key: Name
  #        Value: !Sub '${ProjectName}-${Environment}-alb-cert'
  #      - Key: ManagedBy
  #        Value: CloudFormation

  # ============================================================================
  # Application Load Balancer
  # ============================================================================
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-alb'
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !ImportValue
            Fn::Sub: '${ProjectName}-${Environment}-alb-bucket'
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-alb'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Target Groups
  # ============================================================================
  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-backend-tg'
      Port: 8000.
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPort: 80 # NLM only allow port 80 for health check.
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health/
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 10
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-backend-tg'
        - Key: ManagedBy
          Value: CloudFormation

  ArangoDbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-tg'
      Port: 8529
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health # A reverse proxy is configured with nginx to route /health to the root path /_admin/server/availability, so we can use it for health checks without modifying the ArangoDB configuration.
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-arangodb-tg'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # ALB Listeners
  #
  # All listeners enforce the CloudFront origin secret header. Requests that
  # arrive without the correct X-Custom-Origin-Header value are rejected with
  # 403, preventing direct ALB access that bypasses CloudFront (and its TLS,
  # caching, and WAF protections).
  #
  # Rule evaluation order (priority lowest = evaluated first):
  #   Priority 1: header present and correct → forward to target group
  #   Default:    everything else → 403 Forbidden
  # ============================================================================

  # Port 80 — redirect to HTTPS hint; kept for health checks from AWS services
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  # Port 8000 — Backend API (CloudFront → ALB → ECS backend)
  BackendHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8000
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      # Default action: reject anything that didn't match the header rule
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  BackendHeaderRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref BackendHttpListener
      Priority: 1
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Custom-Origin-Header
            Values:
              - !Sub '{{resolve:secretsmanager:/${ProjectName}/${Environment}/secrets/cloudfront-secret:SecretString}}'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # Port 8529 — ArangoDB web UI and API (CloudFront → ALB → ECS arangodb)
  ArangoDbHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 8529
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      # Default action: reject anything that didn't match the header rule
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '403'
            ContentType: text/plain
            MessageBody: Forbidden

  ArangoDbHeaderRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ArangoDbHttpListener
      Priority: 1
      Conditions:
        - Field: http-header
          HttpHeaderConfig:
            HttpHeaderName: X-Custom-Origin-Header
            Values:
              - !Sub '{{resolve:secretsmanager:/${ProjectName}/${Environment}/secrets/cloudfront-secret:SecretString}}'
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ArangoDbTargetGroup

Outputs:
  LoadBalancerArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-arn'

  LoadBalancerDnsName:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-dns'

  LoadBalancerFullName:
    Description: ALB full name (for metrics)
    Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-alb-full-name'

  BackendTargetGroupArn:
    Description: Backend target group ARN
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-tg-arn'

  ArangoDbTargetGroupArn:
    Description: ArangoDB target group ARN
    Value: !Ref ArangoDbTargetGroup
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-tg-arn'

  BackendUrl:
    Description: Backend API URL
    Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}:80'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-backend-url'

  ArangoDbUrl:
    Description: ArangoDB web UI URL
    Value: !Sub 'https://${ApplicationLoadBalancer.DNSName}:8529'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-arangodb-url'
