AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frontend S3 bucket and CloudFront distribution'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: sandbox
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  # All other inputs come from cross-stack imports:
  #   DomainName      → ${ProjectName}-${Environment}-domain-name
  #   HostedZoneId    → ${ProjectName}-${Environment}-hosted-zone-id
  #   AlbDnsName      → ${ProjectName}-${Environment}-alb-dns
  #   CertificateArn  → ${ProjectName}-${Environment}-acm-cert-arn
  #   CloudFrontSecret → {{resolve:secretsmanager:/${ProjectName}/${Environment}/secrets/cloudfront-secret:SecretString}}

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']

Resources:
  # ============================================================================
  # CloudFront Origin Access Control
  # ============================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-${Environment}-oac'
        Description: !Sub 'OAC for ${ProjectName} ${Environment} frontend'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ============================================================================
  # CloudFront Distribution
  # ============================================================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Comment: !Sub '${ProjectName} ${Environment} frontend'
        Aliases:
          - !If
              - IsProd
              - !ImportValue
                  Fn::Sub: '${ProjectName}-${Environment}-domain-name'
              - !Sub
                - '${Environment}.${Domain}'
                - Domain: !ImportValue
                    Fn::Sub: '${ProjectName}-${Environment}-domain-name'

        # Default origin (S3 - frontend)
        DefaultRootObject: index.html
        Origins:
          # S3 Origin for frontend
          - Id: S3Origin
            DomainName: "frontendbucket.s3-east.amazoneaws.com" # need to turn on the bucket static website hosting to get the domain name in this format, but it allows us to use OAC for secure access without needing a bucket policy
            #DomainName: !GetAtt FrontendBucket.DomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}

          # ALB Origin for backend API (port 8000)
          - Id: ALBOrigin
            DomainName: !ImportValue
              Fn::Sub: '${ProjectName}-${Environment}-alb-dns'
            CustomOriginConfig:
              HTTPSPort: 8000
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Custom-Origin-Header
                HeaderValue: !Sub '{{resolve:secretsmanager:/${ProjectName}/${Environment}/secrets/cloudfront-secret:SecretString}}'

          # ALB Origin for ArangoDB web UI (port 8529)
          - Id: ArangoDbOrigin
            DomainName: !ImportValue
              Fn::Sub: '${ProjectName}-${Environment}-alb-dns'
            CustomOriginConfig:
              HTTPSPort: 8529
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
            OriginCustomHeaders:
              - HeaderName: X-Custom-Origin-Header
                HeaderValue: !Sub '{{resolve:secretsmanager:/${ProjectName}/${Environment}/secrets/cloudfront-secret:SecretString}}'

        # Default behavior (S3)
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized

        # Cache behaviors (evaluated in order; most specific paths first)
        CacheBehaviors:
          # Backend API
          - PathPattern: /arango_api/*
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

          # ArangoDB web UI and REST API paths
          - PathPattern: /_db/*
            TargetOriginId: ArangoDbOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

          - PathPattern: /_api/*
            TargetOriginId: ArangoDbOrigin
            OriginRequestPolicyId: !Ref ArangoDbOriginRequestPolicy
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled

          - PathPattern: /_admin/*
            TargetOriginId: ArangoDbOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # Managed-AllViewer

        # Custom error responses
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        # SSL/TLS certificate (from alb.yaml, shared with ALB listeners)
        ViewerCertificate:
          AcmCertificateArn: !ImportValue
            Fn::Sub: '${ProjectName}-${Environment}-acm-cert-arn'
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        # Price class
        PriceClass: PriceClass_100

      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-cloudfront'
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # CloudFront OriginRequestPolicy
  # ============================================================================
  ArangoDbOriginRequestPolicy:
      Type: AWS::CloudFront::OriginRequestPolicy
      Properties:
        OriginRequestPolicyConfig:
          Name: !Sub '${ProjectName}-${Environment}-arangodb-policy'
          Comment: 'Forwards Host header for ArangoDB redirects'
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Host
              - X-Forwarded-Host
          CookiesConfig:
            CookieBehavior: all
          QueryStringsConfig:
            QueryStringBehavior: all

Outputs:
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${ProjectName}-${Environment}-cloudfront-id'
