AWSTemplateFormatVersion: '2010-09-09'
Description: 'Generates and stores random secrets for the environment (ArangoDB password, Django secret key, CloudFront origin secret) in AWS Secrets Manager'

Parameters:
  ProjectName:
    Type: String
    Default: cell-kn
    Description: Project name for resource naming

  Environment:
    Type: String
    Default: sandbox
    Description: Environment name (dev, sandbox, prod)
    AllowedValues:
      - dev
      - sandbox
      - prod

  # IAM role ARN - empty string in dev (role is created by this template).
  # In sandbox/prod this must be a pre-created ARN passed in from main.yaml.
  LambdaExecutionRoleArn:
    Type: String
    Default: ''
    AllowedPattern: '^(arn:(aws[a-zA-Z-]*)?:iam::\d{12}:role/[a-zA-Z_0-9+=,.@\-_/]+)?$'
    Description: >
      Pre-existing Lambda execution role ARN (sandbox/prod only).
      Leave empty in dev - the role will be created by this template.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project Configuration
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Pre-existing IAM Roles (sandbox/prod only - leave empty in dev)
        Parameters:
          - LambdaExecutionRoleArn

Conditions:
  # IAM role is created only in dev; sandbox/prod use a pre-existing role
  IsDev: !Equals [!Ref Environment, 'sandbox',]

Resources:
  # ============================================================================
  # Lambda Function for Random Secret Generation
  # ============================================================================
  # Generates a random secret on Create; preserves it on Update.
  # All three secrets below share this one Lambda.
  RandomSecretFunction:
    Type: AWS::Lambda::Function
    Metadata:
      cfn-lint:
        config:
          ignore_checks:
            - W1030  # LambdaExecutionRoleArn is intentionally empty in dev (conditional)
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-random-secret"
      Runtime: python3.11
      Handler: index.handler
      Role: 'arn:aws:iam::206537881715:role/NLM-SBOX-CELL-KN-secrete-lambda-role'
      Code:
        ZipFile: |
          import cfnresponse
          import secrets
          import string

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Create':
                      length = int(event.get('ResourceProperties', {}).get('Length', 32))
                      alphabet = string.ascii_letters + string.digits
                      secret = ''.join(secrets.choice(alphabet) for _ in range(length))
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'Secret': secret
                      }, physicalResourceId=secret)
                  elif event['RequestType'] == 'Update':
                      # Preserve existing secret - never rotates on stack update
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'Secret': event['PhysicalResourceId']
                      }, physicalResourceId=event['PhysicalResourceId'])
                  elif event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {},
                          physicalResourceId=event.get('PhysicalResourceId', 'deleted'))
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ============================================================================
  # Random Secrets (one custom resource invocation per secret)
  # ============================================================================
  # ArangoDB root password (50 chars)
  ArangoDbPasswordSecret:
    Type: Custom::RandomSecret
    Properties:
      ServiceToken: !GetAtt RandomSecretFunction.Arn
      Length: '50'

  # Django secret key (64 chars - Django recommends 50+ for SECRET_KEY)
  DjangoSecretKeySecret:
    Type: Custom::RandomSecret
    Properties:
      ServiceToken: !GetAtt RandomSecretFunction.Arn
      Length: '64'

  # CloudFront origin verification secret (32 chars)
  CloudFrontOriginSecret:
    Type: Custom::RandomSecret
    Properties:
      ServiceToken: !GetAtt RandomSecretFunction.Arn
      Length: '32'

  # ============================================================================
  # Secrets Manager Secrets
  #
  # Written here so that tier-2 stacks (arangodb, backend, frontend) can be
  # deployed as independent stacks and read secrets via
  # {{resolve:secretsmanager:...}} without depending on this nested stack's
  # outputs.
  #
  # Paths: /${ProjectName}/${Environment}/secrets/{arangodb-password,
  #         django-secret-key, cloudfront-secret}
  # ============================================================================
  ArangoDbPasswordSecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/secrets/arangodb-password'
      SecretString: !GetAtt ArangoDbPasswordSecret.Secret
      Description: ArangoDB root password (generated, do not modify manually)
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  DjangoSecretKeySecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/secrets/django-secret-key'
      SecretString: !GetAtt DjangoSecretKeySecret.Secret
      Description: Django SECRET_KEY (generated, do not modify manually)
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CloudFrontSecretsManagerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/secrets/cloudfront-secret'
      SecretString: !GetAtt CloudFrontOriginSecret.Secret
      Description: CloudFront origin verification secret (generated, do not modify manually)
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ArangoDbPasswordSecretArn:
    Description: ARN of the ArangoDB root password secret in Secrets Manager
    Value: !Ref ArangoDbPasswordSecretsManagerSecret

  DjangoSecretKeySecretArn:
    Description: ARN of the Django SECRET_KEY secret in Secrets Manager
    Value: !Ref DjangoSecretKeySecretsManagerSecret

  CloudFrontSecretArn:
    Description: ARN of the CloudFront origin verification secret in Secrets Manager
    Value: !Ref CloudFrontSecretsManagerSecret

  LambdaFunctionArn:
    Description: ARN of the secret-generation Lambda (for reference)
    Value: !GetAtt RandomSecretFunction.Arn
